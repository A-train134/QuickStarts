# vim :set filetype=nginx
server {
    listen 8888;
    server_name localhost; 
    root /var/www/basic_site;
    index index.html;
    location /static/ {
        alias /var/www/basic_site/static/;
    }
    # Cache static asset
    # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
    #     alias /var/www/basic_site/static/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }
    #
    location / {
        try_files $uri $uri/ =404;
    }
}
